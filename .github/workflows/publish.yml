name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without a leading v
        required: true
        type: string

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/whitson-pvt-sdk
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Validate release request
        run: |
          test "${GITHUB_REF}" = "refs/heads/main"
          case "${VERSION}" in
            v*) echo "Use version without a leading v" >&2; exit 1 ;;
          esac
          git fetch --tags --force
          ! git rev-parse --verify --quiet "refs/tags/v${VERSION}"

      - name: Bump package version
        run: just bump-version "${VERSION}"

      - name: Run release checks
        run: just prepare-release

      - name: Commit release version
        run: |
          # Standard GitHub Actions bot identity for release version commits.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "Version files already match v${VERSION}"
          else
            git commit -m "release: prepare v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        run: just github-release "${VERSION}" "$(git rev-parse HEAD)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
