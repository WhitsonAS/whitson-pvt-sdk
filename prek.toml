default_language_version.python = "3.14"

[[repos]]
repo = "local"

[[repos.hooks]]
id = "ruff"
name = "ruff"
language = "system"
entry = "just lint-fix"
files = "\\.py$"

[[repos.hooks]]
id = "ty"
name = "ty"
language = "system"
entry = "just ty"
files = "\\.py$"

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.2.0"

[[repos.hooks]]
id = "conventional-pre-commit"
stages = ["commit-msg"]
args = [
    "build",
    "chore",
    "ci",
    "docs",
    "feat",
    "fix",
    "perf",
    "refactor",
    "release",
    "test",
]
